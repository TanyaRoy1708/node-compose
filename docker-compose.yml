version: "3.9"

services:
  app:
    build: .
    container_name: todo_app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongo:27017/todo-app
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - todo-network

  mongo:
    image: mongo:6
    container_name: mongo_db
    # Port 27017 is exposed to the host for debugging.
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped
    networks:
      - todo-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  mongo-data:
    driver: local

networks:
  todo-network:
    driver: bridge
